[agent]
name = MY-MACHINE
capacity = 10
auto_upgrade = true
upgrade_channel = stable
# Machine labels for job selectors, comma-separated key=value pairs.
# e.g. template=LINUX_ABA, os=linux
labels = template=LINUX_ABA
# Where the runtime machine_version (a YYYYMMDDXX number, distinct from the agent
# software version) is persisted. Absent on a fresh machine, so the first start
# reports 0. Update it at runtime via the local REST API (see [rest]).
machine_version_file = state/machine_version.json

[rest]
# Local REST API to read/update the machine_version. Bound to loopback since it is
# meant for callers running on the machine itself.
host = 127.0.0.1
port = 8765

[toil]
wss_url = wss://toil.example.com/ws/soil
api_key = replace-with-registration-api-key

[logging]
# Rotating log file (relative paths are under the agent directory) and level.
file = logs/agent.log
level = INFO
